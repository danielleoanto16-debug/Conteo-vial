<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>CONTADOR VIAL</title>
    <meta name="theme-color" content="#4a5568">
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>
    <style>
        :root {
            --bg-main: #f4f7f6;
            --bg-card: #ffffff;
            --pro-blue: #4a5568;
            --pro-blue-dark: #2d3748;
            --pro-green: #689f7a;
            --pro-red: #c57b7b;
            --text-main: #1a202c;
            --text-sub: #718096;
            --border-light: #e2e8f0;
            --bg-input: #edf2f7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .contenedor {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
            box-sizing: border-box;
            border: 1px solid var(--border-light);
        }

        h2 { font-weight: 800; color: var(--pro-blue-dark); margin-bottom: 15px; font-size: 20px; }

        input[type="text"] {
            width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border-light);
            background: var(--bg-input); border-radius: 10px; box-sizing: border-box;
        }

        button { border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-full { width: 100%; padding: 12px; border-radius: 10px; margin-top: 8px; font-size: 14px; }
        .btn-primary { background: var(--pro-blue); color: white; }
        .btn-secondary { background: var(--bg-input); color: var(--pro-blue-dark); }
        .btn-danger-soft { background: #fff5f5; color: var(--pro-red); border: 1px solid #fed7d7; }

        .switch-container {
            display: flex; align-items: center; justify-content: space-between;
            background: #f8fafc; padding: 10px 15px; border-radius: 10px; margin: 10px 0; border: 1px solid var(--border-light); font-size: 14px;
        }

        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e0; transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 2px; bottom: 2px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--pro-green); }
        input:checked + .slider:before { transform: translateX(20px); }

        .badge-carril { font-size: 10px; padding: 2px 6px; border-radius: 5px; text-transform: uppercase; font-weight: bold; display: inline-block; margin-top: 4px; }
        .badge-1 { background: #e2e8f0; color: #4a5568; }
        .badge-2 { background: #dcfce7; color: #166534; }

        .fila-vehiculo { background: #f8fafc; padding: 8px 12px; border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--border-light); }
        .header-carriles { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 11px; margin-bottom: 10px; color: var(--text-sub); }
        .controles-w { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-mas { background: white; color: var(--pro-green); width: 42px; height: 42px; border-radius: 10px; font-size: 20px; border: 1px solid var(--border-light); }
        .btn-menos { background: white; color: var(--pro-red); width: 36px; height: 36px; border-radius: 8px; font-size: 18px; border: 1px solid var(--border-light); }
        .conteo-num { font-size: 18px; font-weight: 700; min-width: 30px; color: var(--pro-blue-dark); }
        .label-v { font-size: 13px; font-weight: 700; margin-bottom: 5px; color: var(--text-main); text-align: left;}

        #pantallaReporte { display: none; background: white; width: 100%; max-width: 800px; padding: 20px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 20px; }
        th { background: #f0f0f0; color: #000; padding: 6px; border: 1px solid #000; }
        td { padding: 6px; border: 1px solid #000; text-align: center; }
        .resumen-totales { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; text-align: left; }
        .caja-total { border: 1px solid #000; padding: 10px; border-radius: 5px; }
        .caja-total h4 { margin: 0 0 5px 0; font-size: 12px; border-bottom: 1px solid #000; }
        .desglose-vehiculos { font-size: 10px; }
        .desglose-item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; }

        @media print {
            body { background: white !important; padding: 0 !important; }
            #p1, #p2, .no-print { display: none !important; }
            #pantallaReporte { display: block !important; position: absolute; top: 0; left: 0; width: 100%; }
        }
    </style>
</head>
<body>

    <div id="p1" class="contenedor">
        <h2>CONTADOR VIAL</h2>
        <input type="text" id="nomPro" placeholder="Nombre del Punto">
        <div class="switch-container">
            <span>Doble Carril</span>
            <label class="switch"><input type="checkbox" id="checkCarriles"><span class="slider"></span></label>
        </div>
        <button class="btn-full btn-primary" onclick="crear()">Crear Proyecto</button>
        <div id="listaPro" style="margin-top:20px;"></div>
    </div>

    <div id="p2" class="contenedor" style="display:none">
        <div id="txtTit" style="font-size:16px; font-weight:800; color: var(--pro-blue-dark);"></div>
        <div id="txtReloj" style="color:var(--text-sub); font-size:12px; margin-bottom:10px;">Esperando...</div>
        <div class="header-carriles">
            <div>Carril A</div>
            <div id="titCarrilB">Carril B</div>
        </div>
        <div id="zonaControles"></div>
        <button class="btn-full btn-primary" style="background:var(--pro-green);" onclick="saveBloque()">Finalizar Tramo</button>
        <button class="btn-full btn-primary" onclick="verReporte()">Generar Reporte</button>
        <button class="btn-full btn-secondary" onclick="goHome()">Volver</button>
        <div id="listHist" style="margin-top:20px; text-align:left;"></div>
    </div>

    <div id="pantallaReporte">
        <h2 style="margin-bottom: 5px; text-align: center;">REPORTE TÉCNICO DE CONTEO VIAL</h2>
        <div id="metaReporte" style="margin-bottom:15px; font-size:12px; text-align: center; border-bottom: 1px solid #000; padding-bottom: 10px;"></div>
        <div style="overflow-x:auto;">
            <table><thead id="headReporte"></thead><tbody id="bodyReporte"></tbody></table>
        </div>
        <div id="seccionTotales" class="resumen-totales"></div>
        <div class="no-print" style="margin-top:30px; display: flex; gap: 10px;">
            <button class="btn-full btn-primary" onclick="window.print()">Imprimir PDF</button>
            <button class="btn-full btn-secondary" onclick="cerrarReporte()">Volver al Conteo</button>
        </div>
    </div>

<script>
    let db = JSON.parse(localStorage.getItem('vial_apk_v2')) || [];
    let cur = null;
    let countsA = {}, countsB = {};
    let hIni = null;
    
    const tipos = ['persona','moto','sedan','pickup','c.cito','camiones','bus','trailer'];
    const emojis = {persona:'🚶', moto:'🏍️', sedan:'🚗', pickup:'🛻', 'c.cito':'🚛', camiones:'🚚', bus:'🚌', trailer:'🛣️'};

    function save() { localStorage.setItem('vial_apk_v2', JSON.stringify(db)); }
    function goHome() { document.getElementById('p1').style.display='block'; document.getElementById('p2').style.display='none'; document.getElementById('pantallaReporte').style.display='none'; renderHome(); }
    function cerrarReporte() { document.getElementById('pantallaReporte').style.display='none'; document.getElementById('p2').style.display='block'; }

    function crear() {
        let n = document.getElementById('nomPro').value;
        let c2 = document.getElementById('checkCarriles').checked;
        if(!n) return alert("Ingresa nombre");
        cur = { id: Date.now(), nombre: n, dobleCarril: c2, bloques: [] };
        db.push(cur); save(); openP(cur.id);
        document.getElementById('nomPro').value = "";
    }

    function openP(id) {
        cur = db.find(p => p.id === id);
        document.getElementById('txtTit').innerText = cur.nombre.toUpperCase();
        document.getElementById('titCarrilB').style.visibility = cur.dobleCarril ? 'visible' : 'hidden';
        document.getElementById('p1').style.display='none';
        document.getElementById('p2').style.display='block';
        document.getElementById('pantallaReporte').style.display='none';
        initControles(); resetC(); renderHist();
    }

    function initControles() {
        let html = "";
        tipos.forEach(t => {
            html += `<div class="fila-vehiculo">
                <div class="label-v">${emojis[t]} ${t.toUpperCase()}</div>
                <div style="display:grid; grid-template-columns: 1fr ${cur.dobleCarril ? '1fr' : '0fr'}; gap:10px;">
                    <div class="controles-w">
                        <button class="btn-menos" onclick="add('A','${t}',-1)">-</button>
                        <span id="cA-${t}" class="conteo-num">0</span>
                        <button class="btn-mas" onclick="add('A','${t}',1)">+</button>
                    </div>
                    <div class="controles-w" style="display:${cur.dobleCarril ? 'flex' : 'none'}">
                        <button class="btn-menos" onclick="add('B','${t}',-1)">-</button>
                        <span id="cB-${t}" class="conteo-num">0</span>
                        <button class="btn-mas" onclick="add('B','${t}',1)">+</button>
                    </div>
                </div>
            </div>`;
        });
        document.getElementById('zonaControles').innerHTML = html;
    }

    function add(c, t, v) {
        if(v > 0 && !hIni) hIni = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        let obj = c === 'A' ? countsA : countsB;
        if((obj[t] || 0) + v < 0) return;
        obj[t] = (obj[t] || 0) + v;
        document.getElementById(`c${c}-${t}`).innerText = obj[t];
    }

    function saveBloque() {
        if(!hIni) return alert("Sin datos");
        cur.bloques.push({ ini: hIni, fin: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), dA: {...countsA}, dB: {...countsB} });
        save(); resetC(); renderHist();
    }

    function resetC() {
        tipos.forEach(t => { countsA[t] = 0; countsB[t] = 0; });
        hIni = null; document.getElementById('txtReloj').innerText = "Esperando registro...";
        initControles();
    }

    function renderHist() {
        let h = document.getElementById('listHist'); h.innerHTML = "";
        cur.bloques.slice().reverse().forEach((b, i) => {
            let rIdx = cur.bloques.length - 1 - i;
            h.innerHTML += `<div style="font-size:11px; margin-bottom:5px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
                <span><b>T#${rIdx+1}</b> ${b.ini}-${b.fin}</span>
                <button style="color:red; background:none; font-size:10px;" onclick="delB(${rIdx})">X</button>
            </div>`;
        });
    }

    function delB(idx) { if(confirm("¿Borrar?")) { cur.bloques.splice(idx,1); save(); renderHist(); } }
    function delP(id) { if(confirm("¿Borrar?")) { db = db.filter(p => p.id !== id); save(); renderHome(); } }

    function renderHome() {
        let l = document.getElementById('listaPro'); l.innerHTML = "";
        db.slice().reverse().forEach(p => {
            const carrilTxt = p.dobleCarril ? "2 Carriles" : "1 Carril";
            const carrilClass = p.dobleCarril ? "badge-2" : "badge-1";
            l.innerHTML += `<div style="background:#f9f9f9; padding:10px; margin-bottom:8px; border-radius:10px; border:1px solid #ddd; text-align:left;">
                <b style="font-size:14px; display:block;">${p.nombre}</b>
                <span class="badge-carril ${carrilClass}">${carrilTxt}</span>
                <div style="display:flex; gap:5px; margin-top:8px;">
                    <button class="btn-full btn-primary" style="margin:0; padding:5px; flex:2;" onclick="openP(${p.id})">Abrir</button>
                    <button class="btn-full btn-danger-soft" style="margin:0; padding:5px; flex:1;" onclick="delP(${p.id})">Borrar</button>
                </div>
            </div>`;
        });
    }

    function verReporte() {
        if(!cur.bloques.length) return alert("Sin datos");
        const doble = cur.dobleCarril;
        let h = ""; let b = "";
        let vTotA = {}, vTotB = {};
        tipos.forEach(t => { vTotA[t] = 0; vTotB[t] = 0; });

        const labelsHTML = tipos.map(t => `<th>${t.toUpperCase().substring(0,3)}</th>`).join('');

        if(!doble) {
            h = `<tr><th>N°</th><th>Tramo</th>${labelsHTML}<th>TOTAL V.</th></tr>`;
            cur.bloques.forEach((blo, i) => {
                let st = 0; let fila = `<tr><td>${i+1}</td><td>${blo.ini}-${blo.fin}</td>`;
                tipos.forEach(t => { 
                    let v = blo.dA[t] || 0; fila += `<td>${v}</td>`; vTotA[t] += v;
                    if(t !== 'persona') st += v; 
                });
                fila += `<td><b>${st}</b></td></tr>`; b += fila;
            });
        } else {
            h = `<tr><th>N°</th><th>Tramo</th><th>CAR</th>${labelsHTML}<th>TOTAL V.</th></tr>`;
            cur.bloques.forEach((blo, i) => {
                let stA = 0, stB = 0;
                let fA = `<tr><td rowspan="2">${i+1}</td><td rowspan="2">${blo.ini}-${blo.fin}</td><td>A</td>`;
                tipos.forEach(t => { let v = blo.dA[t] || 0; fA += `<td>${v}</td>`; vTotA[t] += v; if(t !== 'persona') stA += v; });
                fA += `<td><b>${stA}</b></td></tr>`;
                let fB = `<tr><td>B</td>`;
                tipos.forEach(t => { let v = blo.dB[t] || 0; fB += `<td>${v}</td>`; vTotB[t] += v; if(t !== 'persona') stB += v; });
                fB += `<td><b>${stB}</b></td></tr>`;
                b += fA + fB;
            });
        }

        const buildDesglose = (datos) => {
            let html = '<div class="desglose-vehiculos">';
            tipos.forEach(t => { if(t !== 'persona') html += `<div class="desglose-item"><span>${t.toUpperCase()}</span> <span>${datos[t]}</span></div>`; });
            return html + '</div>';
        };

        let totalVehA = Object.values(vTotA).reduce((a,b)=>a+b,0) - vTotA.persona;
        let totalVehB = Object.values(vTotB).reduce((a,b)=>a+b,0) - vTotB.persona;

        let totHTML = `<div class="caja-total"><h4>TOTAL CARRIL A</h4><p>VEH: ${totalVehA} | PEAT: ${vTotA.persona}</p><hr>${buildDesglose(vTotA)}</div>`;
        if(doble) {
            totHTML += `<div class="caja-total"><h4>TOTAL CARRIL B</h4><p>VEH: ${totalVehB} | PEAT: ${vTotB.persona}</p><hr>${buildDesglose(vTotB)}</div>`;
            totHTML += `<div class="caja-total" style="grid-column: span 2; text-align:center;"><h4>GRAN TOTAL (A + B)</h4><p>Vehículos: ${totalVehA + totalVehB} | Peatones: ${vTotA.persona + vTotB.persona}</p></div>`;
        }

        document.getElementById('seccionTotales').innerHTML = totHTML;
        document.getElementById('metaReporte').innerText = `UBICACIÓN: ${cur.nombre} | FECHA: ${new Date().toLocaleDateString()}`;
        document.getElementById('headReporte').innerHTML = h;
        document.getElementById('bodyReporte').innerHTML = b;
        document.getElementById('p2').style.display = 'none';
        document.getElementById('pantallaReporte').style.display = 'block';
    }
    renderHome();
</script>
</body>
</html>
